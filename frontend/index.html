<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>Plan a trip — Trip Ideas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <style>
      :root {
        --page-max: 880px;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: #ffffff;
        color: #000000;
      }
      header.site {
        border-bottom: 1px solid #cdcdcd;
        padding: 16px 24px;
      }
      header.site .inner {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 28px;
      }
      header.site .brand {
        font-weight: 700;
        font-size: 16px;
        letter-spacing: -0.01em;
      }
      header.site nav a {
        color: #000;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        margin-right: 20px;
      }
      header.site nav a:last-child {
        margin-right: 0;
      }
      main.page {
        max-width: var(--page-max);
        margin: 0 auto;
        padding: 48px 24px;
      }
      h1.page-title {
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 700;
        margin: 0 0 12px;
        letter-spacing: -0.02em;
      }
      p.page-lede {
        font-size: 1.05rem;
        color: #525252;
        max-width: 38rem;
        margin: 0 0 32px;
        line-height: 1.55;
      }
      .chat-frame {
        height: 70vh;
        min-height: 520px;
        border: 1px solid #cdcdcd;
        border-radius: 0.5rem;
        overflow: hidden;
      }
      footer.demo-meta {
        max-width: var(--page-max);
        margin: 24px auto 64px;
        padding: 0 24px;
        font-size: 0.75rem;
        color: #737373;
      }
      footer.demo-meta code {
        background: #fafafa;
        padding: 0.1em 0.4em;
        border-radius: 0.2em;
        border: 1px solid #cdcdcd;
        font-family: ui-monospace, SFMono-Regular, monospace;
      }
    </style>
  </head>
  <body>
    <header class="site">
      <div class="inner">
        <span class="brand">Trip Ideas</span>
        <nav>
          <a href="#">North Island ▾</a>
          <a href="#">South Island ▾</a>
          <a href="#">Journal</a>
          <a href="#">Map</a>
          <a href="#">Getting Around</a>
        </nav>
      </div>
    </header>

    <main class="page">
      <h1 class="page-title">Plan a trip</h1>
      <p class="page-lede">
        Tell me what you're looking for and I'll put together a real itinerary
        from Trip Ideas content — places, walks, drives, and hidden gems
        across Aotearoa.
      </p>

      <div class="chat-frame">
        <!-- The widget bundle mounts ChatPanel into this div. -->
        <div
          id="tripideas-chat"
          data-mode="embedded"
          style="height: 100%;"
        ></div>
      </div>
    </main>

    <footer class="demo-meta">
      Demo page · API endpoint: <code id="api-display">resolved at runtime</code>
    </footer>

    <!-- Vite injects the bundled script + CSS here during dev/build -->
    <script type="module" src="/src/main.tsx"></script>

    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const display = document.getElementById("api-display");
        const explicit = document.querySelector("script[data-api-url]");
        const fromMount = document
          .getElementById("tripideas-chat")
          ?.getAttribute("data-api-url");
        if (display) {
          display.textContent =
            fromMount ||
            (explicit && explicit.getAttribute("data-api-url")) ||
            "http://localhost:8000/chat";
        }
      });
    </script>
  </body>
</html>
